version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Mount the user's home directory to /workspace inside the container
      # Using long-form syntax to prevent Windows Drive Letter colon parsing errors
      - type: bind
        source: ${USERPROFILE:-${HOME:-/}}
        target: /workspace
        read_only: true
    environment:
      - FLASK_ENV=production # Set to production for production, development for development
      - FLASK_DEBUG=0 # Set to 1 for debugging
    restart: unless-stopped
