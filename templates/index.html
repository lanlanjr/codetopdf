<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code to PDF Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #ffffff;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Tree specific styles */
        .tree-indent {
            margin-left: 24px;
            border-left: 1px dashed #e2e8f0;
            padding-left: 8px;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen flex flex-col font-sans">

    <!-- Header & Input Area -->
    <header class="bg-white border-b border-gray-200 shadow-sm z-10 py-6 px-8 flex-shrink-0">
        <div class="max-w-5xl mx-auto">
            <h1 class="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                </svg>
                Code to PDF Converter
            </h1>
            
            <form id="scan-form" class="flex gap-4 items-center">
                <div class="flex-grow">
                    <label for="dir-path" class="block text-sm font-medium text-gray-700 mb-1">Local Directory Path</label>
                    <textarea id="dir-path" name="dir-path" placeholder="/Users/username/projects/my-app" rows="2" class="w-full rounded-md border border-gray-300 px-4 py-2 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-shadow resize-none"></textarea>
                </div>
                <button type="submit" id="scan-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded-md shadow-sm transition-colors flex items-center gap-2 h-[42px]">
                    <span id="scan-text">Scan Directory</span>
                    <div id="scan-spinner" class="spinner hidden w-[18px] h-[18px] border-[3px]"></div>
                </button>
            </form>
            <div id="scan-alert" class="hidden mt-3 p-3 rounded-md text-sm"></div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow overflow-hidden flex flex-col bg-gray-50 max-w-5xl mx-auto w-full px-8 py-6">
        
        <!-- Settings Panel -->
        <div class="mb-4 bg-white p-4 rounded-lg shadow-sm border border-gray-200">
            <h2 class="text-sm border-b pb-2 font-semibold text-gray-700 mb-3 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-gray-500">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M10.343 3.94c.09-.542.56-.94 1.11-.94h1.093c.55 0 1.02.398 1.11.94l.149.894c.07.424.384.764.78.93.398.164.855.142 1.205-.108l.737-.527a1.125 1.125 0 0 1 1.45.12l.773.774c.39.389.44 1.002.12 1.45l-.527.737c-.25.35-.272.806-.107 1.204.165.397.505.71.93.78l.893.15c.543.09.94.559.94 1.109v1.094c0 .55-.397 1.02-.94 1.11l-.894.149c-.424.07-.764.383-.929.78-.165.398-.143.854.107 1.204l.527.738c.32.447.269 1.06-.12 1.45l-.774.773a1.125 1.125 0 0 1-1.449.12l-.738-.527c-.35-.25-.806-.272-1.203-.107-.398.165-.71.505-.781.929l-.149.894c-.09.542-.56.94-1.11.94h-1.094c-.55 0-1.019-.398-1.11-.94l-.148-.894c-.071-.424-.384-.764-.781-.93-.398-.164-.854-.142-1.204.108l-.738.527c-.447.32-1.06.269-1.45-.12l-.773-.774a1.125 1.125 0 0 1-.12-1.45l.527-.737c.25-.35.272-.806.108-1.204-.165-.397-.506-.71-.93-.78l-.894-.15c-.542-.09-.94-.56-.94-1.109v-1.094c0-.55.398-1.02.94-1.11l.894-.149c.424-.07.765-.383.93-.78.165-.398.143-.854-.108-1.204l-.526-.738a1.125 1.125 0 0 1 .12-1.45l.773-.773a1.125 1.125 0 0 1 1.45-.12l.737.527c.35.25.807.272 1.204.107.397-.165.71-.505.78-.929l.15-.894Z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
                PDF Output Settings
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                
                <div class="col-span-1 md:col-span-5">
                    <label for="setting-title" class="block text-xs font-medium text-gray-500 mb-1">Document Title (Front Page Center)</label>
                    <input type="text" id="setting-title" value="Code Export" placeholder="My Awesome Project" class="w-full text-sm rounded border border-gray-300 px-2 py-1.5 focus:border-indigo-500 focus:ring-1 outline-none">
                </div>

                <div class="col-span-1">
                    <label for="setting-theme" class="block text-xs font-medium text-gray-500 mb-1">Code Theme</label>
                    <select id="setting-theme" class="w-full text-sm rounded border border-gray-300 px-2 py-1.5 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none">
                        <option value="monokai">Monokai (Dark)</option>
                        <option value="dracula">Dracula (Dark)</option>
                        <option value="github-dark">GitHub (Dark)</option>
                        <option value="github-light">GitHub (Light)</option>
                        <option value="xcode">Xcode (Light)</option>
                        <option value="vs">Visual Studio (Light)</option>
                    </select>
                </div>

                <div class="col-span-1">
                    <label for="setting-font" class="block text-xs font-medium text-gray-500 mb-1">Font Family</label>
                    <select id="setting-font" class="w-full text-sm rounded border border-gray-300 px-2 py-1.5 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none">
                        <option value="'Courier New', Courier, monospace">Courier New</option>
                        <option value="Consolas, monospace">Consolas</option>
                        <option value="'Fira Code', monospace">Fira Code</option>
                        <option value="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace">SF Mono / Base</option>
                    </select>
                </div>

                <div class="col-span-1">
                    <label for="setting-size" class="block text-xs font-medium text-gray-500 mb-1">Font Size</label>
                    <select id="setting-size" class="w-full text-sm rounded border border-gray-300 px-2 py-1.5 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none">
                        <option value="8pt">8pt</option>
                        <option value="9pt">9pt</option>
                        <option value="10pt" selected>10pt</option>
                        <option value="11pt">11pt</option>
                        <option value="12pt">12pt</option>
                    </select>
                </div>

                <div class="col-span-1">
                    <label for="setting-paper" class="block text-xs font-medium text-gray-500 mb-1">Paper Size</label>
                    <select id="setting-paper" class="w-full text-sm rounded border border-gray-300 px-2 py-1.5 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none">
                        <option value="A4">A4 Portrait</option>
                        <option value="Letter">Letter Portrait</option>
                        <option value="A4 landscape">A4 Landscape</option>
                        <option value="Custom">Custom...</option>
                    </select>
                </div>

                <div id="custom-paper-inputs" class="col-span-1 hidden flex gap-2 items-end">
                    <div class="w-1/2">
                        <label for="setting-paper-width" class="block text-xs font-medium text-gray-500 mb-1">Width</label>
                        <input type="text" id="setting-paper-width" placeholder="8.5in" class="w-full text-sm rounded border border-gray-300 px-2 py-1.5 focus:border-indigo-500 focus:ring-1 outline-none">
                    </div>
                    <div class="w-1/2">
                        <label for="setting-paper-height" class="block text-xs font-medium text-gray-500 mb-1">Height</label>
                        <input type="text" id="setting-paper-height" placeholder="11in" class="w-full text-sm rounded border border-gray-300 px-2 py-1.5 focus:border-indigo-500 focus:ring-1 outline-none">
                    </div>
                </div>

                <div class="col-span-1 flex items-end pb-1">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="setting-linenos" checked class="w-4 h-4 text-gray-800 rounded border-gray-300 focus:ring-indigo-500">
                        <span class="text-sm text-gray-700 select-none">Show Line Numbers</span>
                    </label>
                </div>

            </div>
        </div>

        <!-- Controls Header (Hidden initially) -->
        <div id="file-controls" class="hidden flex justify-between items-center mb-4 bg-white p-4 rounded-lg shadow-sm border border-gray-200">
            <div>
                <h2 class="text-lg font-semibold text-gray-800">Files Discovered</h2>
                <p class="text-sm text-gray-500" id="scan-stats">Select the files you want to include in the PDF.</p>
            </div>
            <div class="flex gap-3 items-center">
                <button id="expand-tree-btn" type="button" class="text-sm text-gray-800 hover:text-indigo-800 font-medium flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" />
                    </svg>
                    Expand
                </button>
                <span class="text-gray-300">|</span>
                <button id="select-all-btn" class="text-sm text-gray-800 hover:text-indigo-800 font-medium">Select All</button>
                <span class="text-gray-300">|</span>
                <button id="deselect-all-btn" class="text-sm text-gray-600 hover:text-gray-800 font-medium">Deselect All</button>
            </div>
        </div>

        <!-- File List Container -->
        <div id="original-tree-container" class="bg-white rounded-lg shadow-sm border border-gray-200 flex-grow overflow-auto relative">
            
            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 p-8 text-center">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-16 h-16 mb-4 text-gray-300">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9.776c.112-.017.227-.026.344-.026h15.812c.117 0 .232.009.344.026m-16.5 0a2.25 2.25 0 0 0-1.883 2.542l.857 6a2.25 2.25 0 0 0 2.227 1.932H19.05a2.25 2.25 0 0 0 2.227-1.932l.857-6a2.25 2.25 0 0 0-1.883-2.542m-16.5 0V6A2.25 2.25 0 0 1 6 3.75h3.879a1.5 1.5 0 0 1 1.06.44l2.122 2.12a1.5 1.5 0 0 0 1.06.44H18A2.25 2.25 0 0 1 20.25 9v.776" />
                </svg>
                <p class="text-lg font-medium text-gray-500">No files to display</p>
                <p class="text-sm mt-1">Enter a directory path above and click Scan Directory.</p>
            </div>

            <!-- List rendered by JS -->
            <ul id="file-list" class="hidden divide-y divide-gray-100 p-2"></ul>
        </div>
    </main>

    <!-- Bottom Action Bar -->
    <footer class="bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] py-4 px-8 flex-shrink-0 z-10 sticky bottom-0">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <div id="selection-stats" class="text-sm font-medium text-gray-600">
                    0 files selected
                </div>
                <div class="text-xs text-gray-400 mt-1">
                    Made by <strong class="text-indigo-500"><a href="https://github.com/lanlanjr">lanlanjr</a></strong> x <strong class="text-indigo-500"><a href="https://antigravity.google/">Antigravity</a></strong>
                </div>
            </div>
            <button id="generate-pdf-btn" disabled class="bg-green-600 hover:bg-green-700 disabled:bg-gray-400 disabled:cursor-not-allowed text-white font-medium py-2.5 px-8 rounded-md shadow-sm transition-colors flex items-center gap-3">
                <span id="generate-text">Generate & Download PDF</span>
                <div id="generate-spinner" class="spinner hidden"></div>
            </button>
        </div>
    </footer>

    <!-- Error Modal (Hidden) -->
    <div id="error-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-6 mx-4 transform transition-all">
            <h3 class="text-lg font-bold text-red-600 mb-2 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3Z" />
                </svg>
                Error
            </h3>
            <p id="modal-error-text" class="text-gray-700 mb-6"></p>
            <div class="flex justify-end">
                <button id="close-modal-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded-md transition-colors">Close</button>
            </div>
        </div>
    </div>

    <!-- Tree Modal (Hidden) -->
    <div id="tree-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center backdrop-blur-sm p-4 md:p-8">
        <div class="bg-white rounded-lg shadow-xl w-full h-full max-w-6xl flex flex-col overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center flex-shrink-0 bg-gray-50">
                <h3 class="text-lg font-bold text-gray-800">Files Discovered - Expanded View</h3>
                <button id="close-tree-modal-btn" class="text-gray-500 hover:text-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="tree-modal-content" class="flex-grow overflow-auto p-4 relative">
                <!-- Javascript will move ul#file-list here -->
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
